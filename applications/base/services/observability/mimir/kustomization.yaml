---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - "../sources/grafana.yaml"
  - helmrelease.yaml
secretGenerator:
  - name: mimir-values-base
    namespace: observability
    type: Opaque
    files:
      - values.yaml=helm-values/values-6.0.3.yaml
    options:
      disableNameSuffixHash: true
